<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="3;url=https://spring1277.github.io/edu-pipeline/">
  <title>교육·대입 파이프라인이 이전되었습니다</title>
  <style>
    body { font-family: system-ui, "Malgun Gothic", sans-serif; max-width: 640px; margin: 15vh auto; padding: 24px; line-height: 1.7; color: #1b2a24; }
    a { color: #2d6a4f; font-weight: 700; }
  </style>
</head>
<body>
  <h1>교육·대입 파이프라인이 이전되었습니다</h1>
  <p>별도 저장소와 새 주소로 이동합니다.</p>
  <p><a href="https://spring1277.github.io/edu-pipeline/">새 교육·대입 파이프라인 열기</a></p>
  <script>
    (async () => {
      const target = 'https://spring1277.github.io/edu-pipeline/';
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations
            .filter(r => r.scope.includes('/lmf-checklist/edu-pipeline/'))
            .map(r => r.unregister()));
        }
      } finally {
        location.replace(target);
      }
    })();
  </script>
</body>
</html>
